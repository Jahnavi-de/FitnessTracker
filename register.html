<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            margin-bottom: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .login-card label {
            color: white;
        }

        .login-card input {
            border-radius: 10px;
        }
    </style>


</head>

<body>
    <div class="container pt-5">
        <h1 class="text-center mb-4 text-white">Create Account</h1>

        <div class="row justify-content-center">
            <div class="col-md-5">
                <form id="registerForm" class="login-card">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" name="name" id="name" class="form-control" placeholder="Enter your name">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email">

                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">password</label>
                        <input type="password" name="password" class="form-control" id="password"
                            placeholder="Enter password">
                    </div>
                    <div class="mb-3">
                        <label for="confirm-password" class="form-label">Confirm-password</label>
                        <input type="password" name="confirm-password" class="form-control" id="confirm-password"
                            placeholder="Enter password again">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Register</button>
                    <p class="text-center mt-3 text-white">
                        Already have an account?
                        <a href="login.html" class="text-warning">Login</a>
                    </p>


                </form>
            </div>
        </div>


    </div>
    <script>
        $("#registerForm").submit(function (e) {
            e.preventDefault();

            var name = $("#name").val();
            var email = $("#email").val();
            var password = $("#password").val();
            var confirmpassword = $("#confirm-password").val();

            if (password !== confirmpassword) {
                alert("passwords do not match");
                return;
            }
            $.ajax({
                url: "http://localhost/Project1/register.php",
                type: "POST",
                data: {
                    name: name,
                    email: email,
                    password: password
                },
                dataType: "json",
                success: function (res) {
                    console.log(res);
                    if (res.message === "Registration Successful") {
                        alert(res.message);
                        window.location.href = "http://localhost/Project1/login.html";
                    }
                    else {
                        alert(res.message);
                    }
                }
                ,
                error: function (xhr, status, error) {
                    console.log(xhr.responseText);
                }
            });
        });
    </script>

</body>

</html>
